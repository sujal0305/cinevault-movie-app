<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CineVault — Discover Movies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-logo">🎬 CineVault</div>
    <div class="nav-search">
      <input type="text" id="searchInput" placeholder="Search movies, actors, genres…" />
      <button id="searchBtn">Search</button>
    </div>
    <div class="nav-links">
      <a href="#" class="nav-link active" data-section="home">Home</a>
      <a href="#" class="nav-link" data-section="favorites">❤ Favorites</a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero" id="hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <p class="hero-tag">Featured Today</p>
      <h1 class="hero-title" id="heroTitle">Loading…</h1>
      <p class="hero-desc" id="heroDesc"></p>
      <div class="hero-meta" id="heroMeta"></div>
      <div class="hero-actions">
        <button class="btn-primary" id="heroWatchBtn">▶ View Details</button>
        <button class="btn-outline" id="heroFavBtn">+ Favorites</button>
      </div>
    </div>
  </section>

  <!-- MAIN CONTENT -->
  <main class="main">

    <!-- CATEGORIES -->
    <div class="categories-bar">
      <button class="cat-btn active" data-cat="popular">🔥 Popular</button>
      <button class="cat-btn" data-cat="top_rated">⭐ Top Rated</button>
      <button class="cat-btn" data-cat="upcoming">🎞 Upcoming</button>
      <button class="cat-btn" data-cat="now_playing">🎭 Now Playing</button>
      <button class="cat-btn" data-cat="action">💥 Action</button>
      <button class="cat-btn" data-cat="comedy">😂 Comedy</button>
      <button class="cat-btn" data-cat="horror">👻 Horror</button>
      <button class="cat-btn" data-cat="romance">💕 Romance</button>
    </div>

    <!-- SECTION TITLE -->
    <div class="section-header">
      <h2 class="section-title" id="sectionTitle">🔥 Popular Movies</h2>
      <span class="section-count" id="sectionCount"></span>
    </div>

    <!-- MOVIE GRID -->
    <div class="movie-grid" id="movieGrid">
      <!-- Cards injected by JS -->
    </div>

    <!-- LOAD MORE -->
    <div class="load-more-wrap">
      <button class="btn-loadmore" id="loadMoreBtn">Load More</button>
    </div>

  </main>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose">✕</button>
      <div class="modal-backdrop" id="modalBackdrop"></div>
      <div class="modal-body">
        <img class="modal-poster" id="modalPoster" src="" alt="">
        <div class="modal-info">
          <div class="modal-badges" id="modalBadges"></div>
          <h2 class="modal-title" id="modalTitle"></h2>
          <div class="modal-meta" id="modalMeta"></div>
          <p class="modal-overview" id="modalOverview"></p>
          <div class="modal-actions">
            <button class="btn-primary" id="modalTrailerBtn">▶ Watch Trailer</button>
            <button class="btn-outline" id="modalFavBtn">+ Add to Favorites</button>
          </div>
          <div class="modal-cast" id="modalCast"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <footer class="footer">
    <p>Built by <strong>Sujal Mandal</strong> · Powered by TMDB API · <a href="https://github.com/sujal0305" target="_blank">GitHub</a></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
